<line x1="536" y1="141" x2="558" y2="141" stroke="#2e7d4f" stroke-width="1.8" marker-end="url(#arG)"/>
<text x="548" y="132" text-anchor="middle" font-size="9.5" fill="#8a8b8f">no</text>
<rect x="560" y="111" width="176" height="60" rx="10" fill="#ffffff" stroke="#2e7d4f"/>
<text x="648" y="137" text-anchor="middle" font-size="13" font-weight="700" fill="#1c1c1a">Log &amp; close</text>
<text x="648" y="155" text-anchor="middle" font-size="10" fill="#55565a">non-serious record</text>

