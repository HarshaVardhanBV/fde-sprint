<text x="486" y="315" font-size="10.5" fill="#8a8b8f">triage + FAERS + reg</text>
<line x1="640" y1="288" x2="662" y2="288" stroke="#8a8b8f" stroke-width="1.4" marker-end="url(#ar)"/>

<rect x="664" y="250" width="212" height="76" rx="10" fill="#eef1f4" stroke="#3a5bd9" stroke-width="2"/>
