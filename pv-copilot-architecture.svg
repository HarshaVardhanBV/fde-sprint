<svg viewBox="0 0 900 616" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Appendix — how the three point solutions interoperate</title>
<desc>An appendix, not the headline. The portfolio is three independent point solutions (AE Triage, Regulatory Q&A, Safety Agent). This shows the OPTIONAL end-to-end composition available because they share typed contracts: intake, triage, a serious-or-not gate, the FAERS agent with PRR/ROR/IC disproportionality math, the ICH checker, an ICSR draft and human review, wrapped in traceability, visible evals and demo mode.</desc>
<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#8a8b8f"/></marker>
<marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
<marker id="arG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#2e7d4f"/></marker>
</defs>
<rect x="0" y="0" width="900" height="616" fill="#f7f7f5"/>
<text x="24" y="42" font-size="22" font-weight="700" fill="#1c1c1a">Appendix — how the three point solutions interoperate</text>
<text x="24" y="66" font-size="13" fill="#55565a">Optional composition only. Each tool stands alone; because they share typed contracts, a client who wants an end-to-end path can chain them.</text>

