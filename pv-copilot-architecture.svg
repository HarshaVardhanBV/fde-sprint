<text x="678" y="299" font-size="10.5" fill="#55565a">PV specialist signs off</text>
<text x="678" y="315" font-size="10.5" font-weight="700" fill="#3a5bd9">→ ICSR filed / QC'd</text>

<rect x="24" y="360" width="852" height="56" rx="10" fill="#f7f7f5" stroke="#dcddd6"/>
<text x="40" y="382" font-size="11" font-weight="700" letter-spacing="0.5" fill="#3a5bd9">TRACEABILITY SPINE</text>
<text x="40" y="402" font-size="10.5" fill="#55565a">Every step logs: structured output · tool-call trace · source citations · case ID  →  append-only audit log for QA &amp; inspection</text>

<rect x="24" y="424" width="852" height="56" rx="10" fill="#f7f7f5" stroke="#dcddd6"/>
<text x="40" y="446" font-size="11" font-weight="700" letter-spacing="0.5" fill="#3a5bd9">VISIBLE EVALS  ·  Project 3 harness</text>
<text x="40" y="466" font-size="10.5" fill="#55565a">Triage: typed &amp; Pydantic-validated   ·   RAG triad 4.79 / 5 (retrieval 4.57)   ·   Agent 89% match (8/9), rationale grounded 5.0 / 5</text>

<rect x="24" y="488" width="852" height="56" rx="10" fill="#f7f7f5" stroke="#dcddd6"/>
<text x="40" y="510" font-size="11" font-weight="700" letter-spacing="0.5" fill="#3a5bd9">COST &amp; RESILIENCE</text>
<text x="40" y="530" font-size="10.5" fill="#55565a">Router: Haiku extracts/triages · Opus judges signals (~10× cheaper) · concurrent batch   ·   Demo mode: cached outputs + live/cached toggle</text>

<line x1="40" y1="566" x2="62" y2="566" stroke="#c0392b" stroke-width="2"/>
<text x="68" y="570" font-size="10" fill="#55565a">serious path</text>
<line x1="164" y1="566" x2="186" y2="566" stroke="#2e7d4f" stroke-width="2"/>
<text x="192" y="570" font-size="10" fill="#55565a">non-serious path</text>
<text x="320" y="570" font-size="10" fill="#8a8b8f">Human-in-the-loop before anything is filed.</text>
<text x="24" y="598" font-size="11" fill="#55565a">Each box is a standalone point solution, built → evaluated → deployed. This chain is an optional composition, shown only to prove they interoperate.</text>
</svg>
